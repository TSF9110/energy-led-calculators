const getCandelaVal = (thetaRad, phiRad, fixture) => {
  let exactIdx = (thetaRad * 180 / Math.PI) / fixture.step;
  let idx1 = Math.floor(exactIdx);
  let idx2 = Math.ceil(exactIdx);
  
  const maxIdx = fixture.candelaC0 ? fixture.candelaC0.length - 1 : fixture.candela.length - 1;
  if (idx1 > maxIdx) idx1 = maxIdx;
  if (idx2 > maxIdx) idx2 = maxIdx;
  let weight = exactIdx - idx1;

  if (fixture.candelaC0 && fixture.candelaC90) {
    let c0_1 = fixture.candelaC0[idx1];
    let c0_2 = fixture.candelaC0[idx2];
    let c0 = c0_1 * (1 - weight) + c0_2 * weight;

    let c90_1 = fixture.candelaC90[idx1];
    let c90_2 = fixture.candelaC90[idx2];
    let c90 = c90_1 * (1 - weight) + c90_2 * weight;

    let cos2 = Math.pow(Math.cos(phiRad), 2);
    let sin2 = Math.pow(Math.sin(phiRad), 2);
    return c0 * cos2 + c90 * sin2;
  } else {
    let c1 = fixture.candela[idx1];
    let c2 = fixture.candela[idx2];
    return c1 * (1 - weight) + c2 * weight;
  }
};

const getLuxAtPoint = (x, y, height, spacingX, spacingY, fixture) => {
  let totalLux = 0;
  const effHeight = Math.max(0.1, height - 0.75); 
  
  for (let i = -1; i <= 1; i++) {
    for (let j = -1; j <= 1; j++) {
      let fx = i * spacingX;
      let fy = j * spacingY;
      let dx = x - fx;
      let dy = y - fy;
      let distSq = dx * dx + dy * dy + effHeight * effHeight;
      let dist = Math.sqrt(distSq);
      
      let thetaRad = Math.acos(effHeight / dist);
      let phiRad = Math.atan2(dx, dy); 

      if (thetaRad <= Math.PI/2) {
        let I = getCandelaVal(thetaRad, phiRad, fixture);
        let lux = (I * effHeight / (dist * distSq)) * 1.15;
        totalLux += lux;
      }
    }
  }
  return totalLux;
};

const interpolateColor = (color1, color2, factor) => {
  const result = [
    Math.round(color1[0] + factor * (color2[0] - color1[0])),
    Math.round(color1[1] + factor * (color2[1] - color1[1])),
    Math.round(color1[2] + factor * (color2[2] - color1[2]))
  ];
  return `rgb(${result[0]}, ${result[1]}, ${result[2]})`;
};

  const cGreenLight = [187, 247, 208];
  const cGreenDark = [21, 128, 61];

  if (lux < targetLux) {
    const ratio = Math.max(0, lux / targetLux);
    if (ratio < 0.5) return interpolateColor(cRedDark, cRedLight, ratio * 2);
    return interpolateColor(cRedLight, cWhite, (ratio - 0.5) * 2);
  } else {
    const cap = Math.max(targetLux * 1.5, maxLux);
    const ratio = Math.min(1, (lux - targetLux) / (cap - targetLux));
    if (ratio < 0.5) return interpolateColor(cWhite, cGreenLight, ratio * 2);
    return interpolateColor(cGreenLight, cGreenDark, (ratio - 0.5) * 2);
  }
};

const Heatmap = ({ height, spacingX, spacingY, fixture, targetLux, onStatsChange }) => {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    
    const width = canvas.width; 
    const h = canvas.height; 
    
    const sf = 2; 
    const padL = 45 * sf;
    const padB = 35 * sf;
    const padT = 15 * sf;
    const padR = 15 * sf;
    const availW = width - padL - padR;
    const availH = h - padT - padB;
    
    const roomW = spacingX * 3; 
    const roomH = spacingY * 3; 

    const scale = Math.min(availW / roomW, availH / roomH);
    const drawW = roomW * scale;
    const drawH = roomH * scale;

    const offsetX = padL + (availW - drawW) / 2;
    const offsetY = padT + (availH - drawH) / 2;
    
    const resolution = 60; 
    const luxValues = new Float32Array(resolution * resolution);
    
    let minL = Infinity, maxL = -Infinity, sumL = 0;
    let intMinL = Infinity, intMaxL = -Infinity, intSumL = 0, intCount = 0;

    for (let y = 0; y < resolution; y++) {
      for (let x = 0; x < resolution; x++) {
        const px = -1.5 * spacingX + (x / resolution) * roomW;
        const py = -1.5 * spacingY + (y / resolution) * roomH;
        
        const lux = getLuxAtPoint(px, py, height, spacingX, spacingY, fixture);
        luxValues[y * resolution + x] = lux;
        
        if (lux < minL) minL = lux;
        if (lux > maxL) maxL = lux;
        sumL += lux;

        if (px >= -spacingX && px <= spacingX && py >= -spacingY && py <= spacingY) {
          if (lux < intMinL) intMinL = lux;
          if (lux > intMaxL) intMaxL = lux;
          intSumL += lux;
          intCount++;
        }
      }
    }

    const avgL = sumL / (resolution * resolution);
    const intAvgL = intCount > 0 ? intSumL / intCount : 0;
    
    onStatsChange({ 
      overall: { avg: avgL, min: minL, max: maxL },
      interior: { avg: intAvgL, min: intMinL === Infinity ? 0 : intMinL, max: intMaxL === -Infinity ? 0 : intMaxL }
    });

    ctx.clearRect(0, 0, width, h);

    const cellW = drawW / resolution;
    const cellH = drawH / resolution;
    
    for (let y = 0; y < resolution; y++) {
      for (let x = 0; x < resolution; x++) {
        const val = luxValues[y * resolution + x];
        ctx.fillStyle = getHeatmapColor(val, targetLux, maxL);
        ctx.fillRect(offsetX + x * cellW, offsetY + y * cellH, Math.ceil(cellW), Math.ceil(cellH));
      }
    }

    ctx.strokeStyle = 'rgba(168, 85, 247, 0.7)';
    ctx.lineWidth = 0.5 * sf;
    
    const maxCandelaData = fixture.candelaC90 ? Math.max(...fixture.candelaC90) : Math.max(...fixture.candela);
    const physRMax = Math.min(spacingX, spacingY) / 2.2;
    const rMaxScaled = physRMax * scale;

    for (let i = -1; i <= 1; i++) {
      for (let j = -1; j <= 1; j++) {
        const cx = offsetX + ((i * spacingX + 1.5 * spacingX) / roomW) * drawW;
        const cy = offsetY + ((j * spacingY + 1.5 * spacingY) / roomH) * drawH;
        
        if (fixture.shape === 'linear') {
           const rectW = 0.2 * scale; 
           const rectH = fixture.length * scale; 
           ctx.strokeRect(cx - rectW/2, cy - rectH/2, rectW, rectH);
        }
        
        for(let step = 1; step <= 6; step++) {
            const thetaRad = (step / 6) * (Math.PI / 2.5);
            ctx.beginPath();
            for(let a = 0; a <= 360; a += 5) {
                const phiRad = a * Math.PI / 180;
                const candela = getCandelaVal(thetaRad, phiRad, fixture);
                const rVal = (candela / maxCandelaData) * rMaxScaled;
                const px = cx + rVal * Math.sin(phiRad);
                const py = cy - rVal * Math.cos(phiRad); 
                if (a === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.stroke();
        }
        
        for(let a = 0; a < 360; a += 15) {
            ctx.beginPath();
            for(let step = 0; step <= 6; step++) {
                 const thetaRad = (step / 6) * (Math.PI / 2.5);
                 const phiRad = a * Math.PI / 180;
                 const candela = getCandelaVal(thetaRad, phiRad, fixture);
                 const rVal = (candela / maxCandelaData) * rMaxScaled;
                 const px = cx + rVal * Math.sin(phiRad);
                 const py = cy - rVal * Math.cos(phiRad);
                 if (step === 0) ctx.moveTo(px, py);
                 else ctx.lineTo(px, py);
            }
            ctx.stroke();
        }
        
        ctx.beginPath();
        ctx.arc(cx, cy, 3 * sf, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(147, 51, 234, 1)';
        ctx.fill();
      }
    }

    ctx.save();
    ctx.strokeStyle = 'rgba(239, 68, 68, 1)';
    ctx.lineWidth = 2.5 * sf;
    ctx.setLineDash([8 * sf, 6 * sf]);
    ctx.strokeRect(offsetX + drawW/6, offsetY + drawH/6, drawW * (2/3), drawH * (2/3));
    ctx.restore();

    ctx.fillStyle = '#0f172a'; 
    ctx.font = `bold ${11 * sf}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    const steps = 6;
    for (let i = 0; i <= steps; i++) {
      for (let j = 0; j <= steps; j++) {
        const relX = i / steps;
        const relY = j / steps;
        
        const px = offsetX + (10 * sf) + relX * (drawW - 20 * sf);
        const py = offsetY + (10 * sf) + relY * (drawH - 20 * sf);
        
        const realX = -1.5 * spacingX + ((px - offsetX) / drawW) * roomW;
        const realY = -1.5 * spacingY + ((py - offsetY) / drawH) * roomH;
        
        const lux = getLuxAtPoint(realX, realY, height, spacingX, spacingY, fixture);
        
        ctx.shadowColor = 'rgba(255,255,255,0.8)';
        ctx.shadowBlur = 4 * sf;
        ctx.fillText(Math.round(lux), px, py);
        ctx.fillText(Math.round(lux), px, py);
        ctx.shadowBlur = 0; 
      }
    }

    ctx.strokeStyle = '#475569'; 
    ctx.lineWidth = 1 * sf;
    ctx.beginPath();
    ctx.moveTo(offsetX, offsetY);
    ctx.lineTo(offsetX, offsetY + drawH); 
    ctx.lineTo(offsetX + drawW, offsetY + drawH); 
    ctx.stroke();

    ctx.fillStyle = '#94a3b8'; 
    ctx.font = `${11 * sf}px sans-serif`;
    const numTicks = 6;
    for (let i = 0; i <= numTicks; i++) {
      const valX = (i / numTicks) * roomW;
      const valY = (i / numTicks) * roomH;
      
      const cx = offsetX + (i / numTicks) * drawW;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(`${valX.toFixed(1)}m`, cx, offsetY + drawH + (8 * sf));
      ctx.fillRect(cx, offsetY + drawH, 1 * sf, 5 * sf); 

      const cy = offsetY + drawH - (i / numTicks) * drawH; 
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${valY.toFixed(1)}m`, offsetX - (8 * sf), cy);
      ctx.fillRect(offsetX - (5 * sf), cy, 5 * sf, 1 * sf); 
    }

  }, [height, spacingX, spacingY, fixture, targetLux, onStatsChange]);

  return (
    <div className="w-full h-full flex flex-col gap-2 relative">
      <div className="w-full flex-1 relative flex items-center justify-center rounded-lg overflow-hidden bg-slate-900 border border-slate-700">
        <canvas ref={canvasRef} width={1100} height={1000} className="max-w-full max-h-full w-full h-auto bg-slate-50" />
        <div className="absolute top-2 right-2 bg-slate-900/80 backdrop-blur text-xs px-2 py-1 rounded text-slate-300 border border-slate-700 shadow-sm">
          Area: {spacingX * 3}m x {spacingY * 3}m
        </div>
      </div>
      
      <div className="bg-slate-900 border border-slate-700 rounded p-2 flex flex-col gap-1">
        <div className="flex justify-between text-[10px] text-slate-400 font-medium px-1">
          <span>Under Target (Red)</span>
          <span className="text-slate-200">Target: {targetLux} lx</span>
          <span>Over Target (Green)</span>
        </div>
        <div className="h-3 w-full rounded border border-slate-800" style={{
          background: `linear-gradient(to right, 
            ${getHeatmapColor(0, targetLux, targetLux * 2)},
            ${getHeatmapColor(targetLux * 0.5, targetLux, targetLux * 2)},
            ${getHeatmapColor(targetLux, targetLux, targetLux * 2)},
            ${getHeatmapColor(targetLux * 1.5, targetLux, targetLux * 2)},
            ${getHeatmapColor(targetLux * 2, targetLux, targetLux * 2)}
          )`
        }}></div>
      </div>
    </div>
  );
};

const ThreeDView = ({ height, spacingX, spacingY, fixture }) => {
  const containerRef = useRef(null);
  
  useEffect(() => {
    let active = true;
    let renderer, scene, camera, animationId, resizeObserver;
    const container = containerRef.current;

    const initScene = (THREE) => {
      if (!active || !container) return;
      container.innerHTML = ''; 

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x020617);

      const width = container.clientWidth || 800;
      const hHeight = container.clientHeight || 500;
      camera = new THREE.PerspectiveCamera(50, width / hHeight, 0.1, 1000);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
      renderer.setSize(width, hHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      container.appendChild(renderer.domElement);

      const makeTextSprite = (message) => {
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = 'rgba(15, 23, 42, 0.85)'; 
        ctx.fillRect(0, 0, 128, 64);
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 4;
        ctx.strokeRect(0, 0, 128, 64);
        
        ctx.fillStyle = '#f8fafc'; 
        ctx.font = 'bold 28px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(message, 64, 32);
        
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
        const sprite = new THREE.Sprite(spriteMaterial);
        
        const spriteScale = Math.max(2.5, Math.max(spacingX, spacingY) * 0.15);
        sprite.scale.set(spriteScale * 2, spriteScale, 1); 
        return sprite;
      };

      // Floor
      const floorW = spacingX * 4;
      const floorH = spacingY * 4;
      const planeGeo = new THREE.PlaneGeometry(floorW, floorH);
      const planeMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8 });
      const plane = new THREE.Mesh(planeGeo, planeMat);
      plane.rotation.x = -Math.PI / 2;
      plane.receiveShadow = true;
      scene.add(plane);

      // Grid Helpers
      const maxFloor = Math.max(floorW, floorH);
      const gridHelper = new THREE.GridHelper(maxFloor, Math.ceil(maxFloor / (Math.min(spacingX, spacingY)/2)), 0x475569, 0x0f172a);
      gridHelper.position.y = 0.05;
      scene.add(gridHelper);

      // Distance Axis Markers
      const numTicks = 3;
      const roomDimX = spacingX * 3;
      const roomDimY = spacingY * 3;
      for (let i = 0; i <= numTicks; i++) {
        const xPos = -1.5 * spacingX + (i / numTicks) * roomDimX;
        const xLabel = makeTextSprite(`${(xPos + 1.5 * spacingX).toFixed(1)}m`);
        xLabel.position.set(xPos, 0.5, 1.5 * spacingY + 1.5); 
        scene.add(xLabel);

        const zPos = -1.5 * spacingY + (i / numTicks) * roomDimY;
        const zLabel = makeTextSprite(`${(roomDimY - (zPos + 1.5 * spacingY)).toFixed(1)}m`);
        zLabel.position.set(-1.5 * spacingX - 1.5, 0.5, zPos); 
        scene.add(zLabel);
      }

      // Interior Area Box
      const boxGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(spacingX * 2, spacingY * 2));
      const boxMat = new THREE.LineDashedMaterial({ color: 0xef4444, dashSize: 0.5, gapSize: 0.3, linewidth: 2 });
      const boxMesh = new THREE.LineSegments(boxGeo, boxMat);
      boxMesh.computeLineDistances(); 
      boxMesh.rotation.x = -Math.PI / 2;
      boxMesh.position.y = 0.1; 
      scene.add(boxMesh);

      const ldcMat = new THREE.MeshBasicMaterial({ 
        color: 0xa855f7,
        transparent: true, 
        opacity: 0.08, 
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const wireMat = new THREE.MeshBasicMaterial({
        color: 0xa855f7,
        wireframe: true,
        transparent: true,
        opacity: 0.5
      });

      // Construct customized LDC geometry
      let ldcGeo;
      if (fixture.candelaC0 && fixture.candelaC90) {
        ldcGeo = new THREE.SphereGeometry(1, 64, 32, 0, Math.PI * 2, 0, Math.PI / 2);
        const pos = ldcGeo.attributes.position;
        const maxCandela = Math.max(...fixture.candelaC90);
        const scaleFactor = height / maxCandela;
        
        for (let i = 0; i < pos.count; i++) {
            const vx = pos.getX(i);
            const vy = pos.getY(i);
            const vz = pos.getZ(i);
            
            const rBase = Math.sqrt(vx*vx + vy*vy + vz*vz);
            const thetaRad = Math.acos(vy / rBase); 
            const phiRad = Math.atan2(vx, vz);
            
            const candela = getCandelaVal(thetaRad, phiRad, fixture);
            const rNew = candela * scaleFactor;
            
            pos.setXYZ(i, (vx/rBase) * rNew, -(vy/rBase) * rNew, (vz/rBase) * rNew);
        }
        ldcGeo.computeVertexNormals();
      } else {
        const scaleFactor = height / fixture.candela[0]; 
        const points = [];
        for (let k = fixture.candela.length - 1; k >= 0; k--) {
          const angleRad = (k * fixture.step) * Math.PI / 180;
          const r = fixture.candela[k] * scaleFactor;
          const ptX = r * Math.sin(angleRad);
          const ptY = -r * Math.cos(angleRad);
          points.push(new THREE.Vector2(ptX, ptY));
        }
        ldcGeo = new THREE.LatheGeometry(points, 32);
      }

      const intensity = Math.max(1.5, fixture.lumen / 6000); 
      const beamAngle = fixture.beamAngle;

      for (let i = -1; i <= 1; i++) {
        for (let j = -1; j <= 1; j++) {
          const x = i * spacingX;
          const z = j * spacingY;

          let fixGeo;
          if (fixture.shape === 'linear') {
             fixGeo = new THREE.BoxGeometry(0.15, 0.1, fixture.length); 
          } else {
             fixGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.2, 16);
          }
          
          const fixMat = new THREE.MeshBasicMaterial({ color: 0x94a3b8 });
          const fixtureMesh = new THREE.Mesh(fixGeo, fixMat);
          fixtureMesh.position.set(x, height, z);
          scene.add(fixtureMesh);

          const spotLight = new THREE.SpotLight(0xffffff, intensity);
          spotLight.position.set(x, height, z);
          spotLight.angle = beamAngle;
          spotLight.penumbra = 0.4;
          spotLight.decay = 1.5;
          spotLight.distance = height * 4;
          spotLight.castShadow = true;
          spotLight.shadow.mapSize.width = 1024;
          spotLight.shadow.mapSize.height = 1024;

          const target = new THREE.Object3D();
          target.position.set(x, 0, z);
          scene.add(target);
          spotLight.target = target;
          scene.add(spotLight);

          const ldcMesh = new THREE.Mesh(ldcGeo, ldcMat);
          ldcMesh.position.set(x, height, z);
          scene.add(ldcMesh);

          const wireMesh = new THREE.Mesh(ldcGeo, wireMat);
          wireMesh.position.set(x, height, z);
          scene.add(wireMesh);
        }
      }

      const ambient = new THREE.AmbientLight(0xffffff, 0.2);
      scene.add(ambient);

      let theta = Math.PI / 4;
      let phi = Math.PI / 3;
      let radius = Math.max(Math.max(spacingX, spacingY) * 5.5, height * 3.5, 40);
      
      const updateCamera = () => {
        camera.position.x = radius * Math.sin(phi) * Math.sin(theta);
        camera.position.y = radius * Math.cos(phi);
        camera.position.z = radius * Math.sin(phi) * Math.cos(theta);
        camera.lookAt(0, 0, 0);
      };
      updateCamera();

      let isDragging = false;
      let prevPos = { x: 0, y: 0 };

      const onMouseDown = (e) => {
        isDragging = true;
        prevPos = { x: e.clientX, y: e.clientY };
      };
      const onMouseUp = () => isDragging = false;
      const onMouseMove = (e) => {
        if (!isDragging) return;
        const delta = { x: e.clientX - prevPos.x, y: e.clientY - prevPos.y };
        theta -= delta.x * 0.01;
        phi -= delta.y * 0.01;
        phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, phi)); 
        updateCamera();
        prevPos = { x: e.clientX, y: e.clientY };
      };
      
      const onWheel = (e) => {
        e.preventDefault();
        radius += e.deltaY * 0.05;
        radius = Math.max(5, Math.min(150, radius));
        updateCamera();
      };

      container.addEventListener('mousedown', onMouseDown);
      container.addEventListener('mouseup', onMouseUp);
      container.addEventListener('mouseleave', onMouseUp);
      container.addEventListener('mousemove', onMouseMove);
      container.addEventListener('wheel', onWheel, { passive: false });

      resizeObserver = new ResizeObserver(() => {
        if (!container || !camera || !renderer) return;
        const w = container.clientWidth || 800;
        const h = container.clientHeight || 500;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });
      resizeObserver.observe(container);

      const animate = () => {
        if (!active) return;
        animationId = requestAnimationFrame(animate);
        renderer.render(scene, camera);
      };
      animate();
    };

    if (window.THREE) {
      initScene(window.THREE);
    } else {
      const script = document.createElement('script');
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";
      script.onload = () => { if (active) initScene(window.THREE); };
      document.head.appendChild(script);
    }

    return () => {
      active = false;
      if (animationId) cancelAnimationFrame(animationId);
      if (resizeObserver && container) resizeObserver.unobserve(container);
      if (renderer) renderer.dispose();
    };
  }, [height, spacingX, spacingY, fixture]);

  return (
    <div className="w-full h-full relative rounded-lg overflow-hidden bg-slate-950 border border-slate-700">
      <div ref={containerRef} className="w-full h-full cursor-move" />
      <div className="absolute top-2 left-2 bg-slate-900/80 backdrop-blur text-xs px-2 py-1 rounded text-slate-300 border border-slate-700 pointer-events-none shadow-sm flex flex-col gap-1">
        <span>3x3 Grid Layout</span>
        <span className="text-[10px] text-red-400 font-bold tracking-wide">Striped Red: Interior Bounds</span>
      </div>
      <div className="absolute bottom-2 left-2 bg-slate-900/80 backdrop-blur text-xs px-2 py-1 rounded text-slate-400 border border-slate-700 pointer-events-none shadow-sm">
        Drag to rotate • Scroll to zoom
      </div>
    </div>
  );
};

const PolarChart = ({ fixture }) => {
  const dataC90 = fixture.candelaC90 || fixture.candela;
  const dataC0 = fixture.candelaC0; 
  const maxCandela = Math.max(...dataC90);
  const ringStep = Math.ceil(maxCandela / 3 / 1000) * 1000 || 1000;
  
  const generatePath = (data, side) => {
    let path = 'M 0 0 ';
    data.forEach((val, i) => {
      const angleDeg = i * fixture.step;
      const angleRad = (side === 'left' ? -angleDeg : angleDeg) * Math.PI / 180;
      const r = (val / (ringStep * 3)) * 120;
      const x = r * Math.sin(angleRad);
      const y = r * Math.cos(angleRad);
      path += `L ${x} ${y} `;
    });
    return path;
  };

  return (
    <div className="w-full h-full flex items-center justify-center">
      <svg viewBox="-140 -20 280 160" preserveAspectRatio="xMidYMid meet" className="w-full h-full max-h-full">
        {[ringStep, ringStep * 2, ringStep * 3].map(val => {
          const r = (val / (ringStep * 3)) * 120;
          return (
            <g key={val}>
              <circle cx="0" cy="0" r={r} fill="none" stroke="#334155" strokeWidth="1" strokeDasharray="4 4" />
              <text x={r + 2} y="10" fontSize="8" fill="#64748b">{val} cd</text>
            </g>
          );
        })}
        {[-90, -60, -30, 0, 30, 60, 90].map(angle => {
          const rad = angle * Math.PI / 180;
          return (
            <line key={angle} x1="0" y1="0" x2={130 * Math.sin(rad)} y2={130 * Math.cos(rad)} stroke="#334155" strokeWidth="1" />
          )
        })}
        <path d={generatePath(dataC90, 'right')} fill="rgba(168, 85, 247, 0.2)" stroke="#a855f7" strokeWidth="2" />
        <path d={generatePath(dataC90, 'left')} fill="rgba(168, 85, 247, 0.2)" stroke="#a855f7" strokeWidth="2" />
        
        {dataC0 && (
          <>
            <path d={generatePath(dataC0, 'right')} fill="none" stroke="#d8b4fe" strokeWidth="2" strokeDasharray="4 4" />
            <path d={generatePath(dataC0, 'left')} fill="none" stroke="#d8b4fe" strokeWidth="2" strokeDasharray="4 4" />
          </>
        )}
      </svg>
    </div>
  );
};

const DepreciationChart = ({ stats, targetLux, fixture, isGeneratingPDF }) => {
  const width = 800;
  const height = 350; 
  const padding = { top: 20, right: 30, bottom: 80, left: 50 }; 
  
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;
  const maxHours = 120000;
  
  const avgLuxOverall = stats.overall.avg;
  const avgLuxInterior = stats.interior.avg;
  const maxY = Math.max(avgLuxInterior * 1.1, avgLuxOverall * 1.1, targetLux * 1.2, 100);

  let pathOverall = '';
  let pathInterior = '';

  for(let t = 0; t <= maxHours; t += 2000) {
    const lOverall = avgLuxOverall * Math.exp(-fixture.alpha * t);
    const lInterior = avgLuxInterior * Math.exp(-fixture.alpha * t);
    
    const x = padding.left + (t / maxHours) * innerW;
    
    const yOverall = padding.top + innerH - (lOverall / maxY) * innerH;
    if (t === 0) pathOverall += `M ${x} ${yOverall} `;
    else pathOverall += `L ${x} ${yOverall} `;

    const yInterior = padding.top + innerH - (lInterior / maxY) * innerH;
    if (t === 0) pathInterior += `M ${x} ${yInterior} `;
    else pathInterior += `L ${x} ${yInterior} `;
  }

  let crossingTime = 0;
  if (avgLuxInterior > targetLux) {
    crossingTime = -Math.log(targetLux / avgLuxInterior) / fixture.alpha;
  }
  const crossingValid = crossingTime > 0 && crossingTime <= maxHours;
  const cx = padding.left + (crossingTime / maxHours) * innerW;
  const ty = padding.top + innerH - (targetLux / maxY) * innerH;

  return (
    <div className={`w-full flex items-center justify-center relative ${isGeneratingPDF ? '' : 'h-full'}`}>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox={`0 0 ${width} ${height}`} width={width} height={height} preserveAspectRatio="xMidYMid meet" className="block text-xs font-sans" style={{ width: '100%', height: 'auto', maxWidth: '100%', overflow: 'visible' }}>
        <line x1={padding.left} y1={padding.top} x2={padding.left} y2={height - padding.bottom} stroke="#475569" strokeWidth="2" />
        <line x1={padding.left} y1={height - padding.bottom} x2={width - padding.right} y2={height - padding.bottom} stroke="#475569" strokeWidth="2" />
        
        {[0, 0.25, 0.5, 0.75, 1].map(frac => {
          const val = frac * maxY;
          const y = padding.top + innerH - frac * innerH;
          return (
            <g key={frac}>
              <line x1={padding.left - 5} y1={y} x2={width - padding.right} y2={y} stroke="#334155" strokeDasharray={frac===0?"":"4 4"} />
              <text x={padding.left - 10} y={y + 4} fill="#94a3b8" textAnchor="end">{Math.round(val)}</text>
            </g>
          )
        })}

        {[0, 25000, 50000, 75000, 100000, 120000].map(h => {
          const x = padding.left + (h / maxHours) * innerW;
          return (
            <g key={h}>
              <line x1={x} y1={height - padding.bottom} x2={x} y2={height - padding.bottom + 5} stroke="#475569" />
              <text x={x} y={height - padding.bottom + 25} fill="#94a3b8" textAnchor="middle">{(h/1000)}k hrs</text>
            </g>
          )
        })}

        <path d={pathOverall} fill="none" stroke="#64748b" strokeWidth="2" strokeDasharray="4 4" />
        <text x={padding.left + 10} y={padding.top + 25} fill="#64748b">Overall Area</text>

        <path d={pathInterior} fill="none" stroke="#3b82f6" strokeWidth="3" />
        <text x={padding.left + 10} y={padding.top + 10} fill="#3b82f6" fontWeight="bold">Core Interior Area</text>

        <line x1={padding.left} y1={ty} x2={width - padding.right} y2={ty} stroke="#ef4444" strokeWidth="2" strokeDasharray="6 4" />
        <text x={width - padding.right - 10} y={ty - 8} fill="#ef4444" textAnchor="end" fontWeight="bold">Target: {targetLux} Lux</text>

        {crossingValid && (
          <g>
            <circle cx={cx} cy={ty} r="5" fill="#ef4444" />
            <line x1={cx} y1={ty} x2={cx} y2={height - padding.bottom} stroke="#ef4444" strokeWidth="1" strokeDasharray="4 4" />
            <rect x={cx - 40} y={height - padding.bottom - 40} width="80" height="24" rx="4" fill="#1e293b" stroke="#ef4444" />
            <text x={cx} y={height - padding.bottom - 24} fill="#f8fafc" textAnchor="middle" fontWeight="bold">
              {Math.round(crossingTime).toLocaleString()}h
            </text>
          </g>
        )}
      </svg>
    </div>
  );
};

        <Clock className="absolute right-[-10px] bottom-[-10px] w-24 h-24 text-slate-800 opacity-50 z-0" />

);

export default function App() {
  const [modelId, setModelId] = useState('g5');
  const [lumenId, setLumenId] = useState('15k');
  const [beamId, setBeamId] = useState('wb');

  const [height, setHeight] = useState(10.0);
  const [spacingX, setSpacingX] = useState(10);
  const [spacingY, setSpacingY] = useState(10);
  const [targetLux, setTargetLux] = useState(75);
  const [viewMode, setViewMode] = useState('2d'); 
  
  const [stats, setStats] = useState({ 
    overall: { avg: 0, min: 0, max: 0 },
    interior: { avg: 0, min: 0, max: 0 }
  });

  const [isSidebarOpen, setIsSidebarOpen] = useState(true);
  const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
  const [logoError, setLogoError] = useState(false);

  const handleModelChange = (e) => {
    const newModel = e.target.value;
    setModelId(newModel);
    const validLumens = Object.keys(FIXTURE_MODELS[newModel].lumens);
    const newLumen = validLumens[0];
    setLumenId(newLumen);
    const validBeams = Object.keys(FIXTURE_MODELS[newModel].lumens[newLumen].beams);
    setBeamId(validBeams[0]);

    if (newModel === 'wt120c') {
      setHeight(3.0);
      setSpacingX(5);
      setSpacingY(5);
    } else {
      setHeight(10.0);
      setSpacingX(10);
      setSpacingY(10);
    }
  };

  const handleLumenChange = (e) => {
    const newLumen = e.target.value;
    setLumenId(newLumen);
    const validBeams = Object.keys(FIXTURE_MODELS[modelId].lumens[newLumen].beams);
    if (!validBeams.includes(beamId)) setBeamId(validBeams[0]);
  };

  const fixtureDef = useMemo(() => {
    const currentModel = FIXTURE_MODELS[modelId];
    const currentLumen = currentModel.lumens[lumenId];
    const currentBeam = currentLumen.beams[beamId];
    
    return {
       id: `${modelId}_${lumenId}_${beamId}`,
       name: currentModel.name,
       desc: currentModel.desc,
       alpha: currentModel.alpha,
       shape: currentModel.shape,
       length: currentLumen.length || 0,
       candela: currentBeam.candela || currentBeam.data,
       candelaC0: currentBeam.candelaC0,
       candelaC90: currentBeam.candelaC90,
       step: currentBeam.step,
       beamAngle: currentBeam.angle,
       beamName: currentBeam.name,
       lumenName: currentLumen.name,
       lumen: parseInt(lumenId.replace('k', '000').replace('s', '000')) || 15000
    };
  }, [modelId, lumenId, beamId]);

  const yearsToFailureOverall = useMemo(() => {
    if (stats.overall.avg <= targetLux) return 0;
    return (-Math.log(targetLux / stats.overall.avg) / fixtureDef.alpha) / (12 * 365);
  }, [stats.overall.avg, targetLux, fixtureDef.alpha]);

  const yearsToFailureInterior = useMemo(() => {
    if (stats.interior.avg <= targetLux) return 0;
    return (-Math.log(targetLux / stats.interior.avg) / fixtureDef.alpha) / (12 * 365);
  }, [stats.interior.avg, targetLux, fixtureDef.alpha]);

  const handleDownloadPDF = async () => {
    window.scrollTo(0, 0); 
    setIsGeneratingPDF(true);

    try {
      if (!window.html2pdf) {
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
          script.onload = resolve;
          script.onerror = () => reject(new Error("Failed to load html2pdf script"));
          document.head.appendChild(script);
        });
      }

      setTimeout(() => {
        window.scrollTo(0, 0);

            backgroundColor: '#020617',
            windowWidth: 800,
            width: 800,
            x: 0,
            y: 0,
            scrollY: 0,
            scrollX: 0
          },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        window.html2pdf().set(opt).from(element).save()
          .then(() => setIsGeneratingPDF(false))
          .catch((err) => {
            console.error('PDF Generation Engine Error:', err);
            setIsGeneratingPDF(false);

                      <dl className="space-y-1.5 text-sm">
                        <div className="flex justify-between"><dt className="text-slate-400">Day 1 Avg Lux:</dt><dd className="font-bold text-purple-400 text-base">{Math.round(stats.interior.avg)} lx</dd></div>
                        <div className="flex justify-between"><dt className="text-slate-400">Uniformity (Min/Avg):</dt><dd className="font-bold text-purple-400 text-base">{stats.interior.avg > 0 ? (stats.interior.min / stats.interior.avg).toFixed(2) : 0}</dd></div>
                        <div className="flex justify-between"><dt className="text-slate-400">Max Lux:</dt><dd className="font-bold text-purple-400 text-base">{Math.round(stats.interior.max)} lx</dd></div>
                        <div className="flex justify-between"><dt className="text-slate-400">Est. Maint. Cycle:</dt><dd className="font-bold text-red-400 text-base">{yearsToFailureInterior > 0 ? `${yearsToFailureInterior.toFixed(1)} yrs` : 'Fail'}</dd></div>
                      </dl>
                    </div>
                  </div>

                  <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-2 mt-2 shadow-sm text-sm text-slate-300 leading-relaxed">
                    <div className="flex items-start gap-3">
                      <Info className="w-5 h-5 text-purple-400 shrink-0 mt-0.5" />
                      <div>
                        <h3 className="text-sm font-semibold text-slate-200 mb-1">Why evaluate the Core Interior Area?</h3>
                        <p className="text-xs leading-relaxed">
                          In a real-world layout, the lighting grid extends continuously across the ceiling. Simulating only a standalone 3x3 sample naturally creates dark "edge drop-offs" on the outer perimeter, artificially lowering the average lux and ruining the uniformity score. By isolating the <strong>Core Interior Area</strong> (the space perfectly bounded between the outer fixtures, marked by the <span className="inline-block w-4 h-0 border-t border-dashed border-red-500 align-middle mx-1"></span> striped red lines), we eliminate these false edges. This provides a highly accurate representation of the true operational lighting your facility will experience day-to-day.
                        </p>
                      </div>
                    </div>
                  </div>

                  <KpiRow title="Overall Area (Including Outer Edges)" stats={stats.overall} yearsToFailure={yearsToFailureOverall} isInterior={false} isGeneratingPDF={true} />
                  <KpiRow title="Core Interior Area (Continuous Grid Simulation)" stats={stats.interior} yearsToFailure={yearsToFailureInterior} isInterior={true} isGeneratingPDF={true} />
                </div>

                <div className="html2pdf__page-break"></div>

                {/* PAGE 2 */}
                <div className="w-full mt-4">
                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 w-full h-[600px]">
                    <h2 className="text-xl font-semibold text-slate-200 mb-4">Floor Layout Illumination (2D)</h2>
                    <div className="w-full h-[520px] relative">
                       <Heatmap height={height} spacingX={spacingX} spacingY={spacingY} fixture={fixtureDef} targetLux={targetLux} onStatsChange={setStats} />
                    </div>
                  </div>
                </div>

                <div className="html2pdf__page-break"></div>

                {/* PAGE 3 */}
                <div className="w-full mt-4">
                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 w-full h-[600px]">
                    <h2 className="text-xl font-semibold text-slate-200 mb-4">Floor Layout Illumination (3D)</h2>
                    <div className="w-full h-[520px] relative">
                       <ThreeDView height={height} spacingX={spacingX} spacingY={spacingY} fixture={fixtureDef} />
                    </div>
                  </div>
                </div>

                <div className="html2pdf__page-break"></div>

                {/* PAGE 4 */}
                <div className="w-full space-y-6 mt-4">
                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 w-full">
                    <div className="flex items-center justify-between mb-4">
                      <h2 className="text-xl font-semibold text-slate-200">Lifetime Lumen Depreciation</h2>
                      <div className="flex gap-4">
                        <div className="flex items-center gap-2">
                          <div className="w-4 h-0 border-t-2 border-slate-500 border-dashed"></div>
                          <span className="text-xs text-slate-400">Overall Avg</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <div className="w-4 h-1 bg-purple-500 rounded"></div>
                          <span className="text-xs text-slate-400">Interior Avg</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <div className="w-3 h-3 rounded-full bg-red-500"></div>
                          <span className="text-xs text-slate-400">Target Lux</span>
                        </div>
                      </div>
                    </div>
                    
                    {/* SVG container completely fills width without restricting height on PDF print */}
                    <div className="w-full bg-slate-950 rounded-lg border border-slate-800 p-4 sm:p-6">
                      <DepreciationChart stats={stats} targetLux={targetLux} fixture={fixtureDef} isGeneratingPDF={true} />
                    </div>
                    
                    <p className="text-xs text-slate-500 mt-4 text-center">
                      Based on empirical test data predicting {fixtureDef.desc}. Calculation uses an exponential fit decay model: α = {fixtureDef.alpha.toExponential(3)}. 
                    </p>
                  </div>
                  
                  <div className="pt-4 border-t-2 border-slate-800 w-full">
                     <h4 className="font-bold text-slate-300 mb-2">Disclaimer</h4>
                     <p className="text-xs text-slate-500 text-justify leading-relaxed">
                       The following values are based on precise calculations performed on calibrated lamps and luminaires, and their configurations, whereby gradual, unavoidable deviations can occur in practice. All guarantee claims are excluded for the specified data. This exclusion of liability applies irrespective of the legal grounds for both damages and consequential damages suffered by users and third parties.
                     </p>
                  </div>
                </div>
              </>

            ) : (
              
              /* ===================== STANDARD BROWSER DASHBOARD MODE ===================== */
              <>
                <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5 shadow-sm text-sm text-slate-300 leading-relaxed mb-6">
                  <div className="flex items-start gap-4">
                    <Info className="w-6 h-6 text-purple-400 shrink-0 mt-0.5" />
                    <div>
                      <h3 className="text-base font-semibold text-slate-200 mb-1">Why evaluate the Core Interior Area?</h3>
                      <p>
                        In a real-world layout, the lighting grid extends continuously across the ceiling. Simulating only a standalone 3x3 sample naturally creates dark "edge drop-offs" on the outer perimeter, artificially lowering the average lux and ruining the uniformity score. By isolating the <strong>Core Interior Area</strong> (the space perfectly bounded between the outer fixtures, marked by the <span className="inline-block w-6 h-0 border-t-2 border-dashed border-red-500 align-middle mx-1"></span> striped red lines), we eliminate these false edges. This provides a highly accurate representation of the true operational lighting your facility will experience day-to-day.
                      </p>
                    </div>
                  </div>
                </div>

                <KpiRow title="Overall Area (Including Outer Edges)" stats={stats.overall} yearsToFailure={yearsToFailureOverall} isInterior={false} isGeneratingPDF={false} />
                <KpiRow title="Core Interior Area (Continuous Grid Simulation)" stats={stats.interior} yearsToFailure={yearsToFailureInterior} isInterior={true} isGeneratingPDF={false} />

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 pt-4">
                  
                  <div className="lg:col-span-2 bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-sm flex flex-col">
                    <div className="flex items-center justify-between mb-4">
                      <h2 className="text-lg font-semibold text-slate-200">Floor Layout Illumination (3x3 Grid)</h2>
                      <div className="flex gap-2">
                        <button 
                          onClick={() => setViewMode('2d')}
                          className={`flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-md transition-colors ${viewMode === '2d' ? 'bg-purple-600/20 text-purple-400 border border-purple-500/30' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                        >
                          <Grid className="w-3.5 h-3.5" /> 2D Map
                        </button>
                        <button 
                          onClick={() => setViewMode('3d')}
                          className={`flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-md transition-colors ${viewMode === '3d' ? 'bg-purple-600/20 text-purple-400 border border-purple-500/30' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                        >
                          <Box className="w-3.5 h-3.5" /> 3D Room
                        </button>
                      </div>
                    </div>
                    <div className="flex-1 min-h-[350px] relative">
                      <div className={viewMode === '2d' ? 'w-full h-full' : 'hidden'}>
                        <Heatmap height={height} spacingX={spacingX} spacingY={spacingY} fixture={fixtureDef} targetLux={targetLux} onStatsChange={setStats} />
                      </div>
                      {viewMode === '3d' && (
                        <div className="w-full h-full">
                          <ThreeDView height={height} spacingX={spacingX} spacingY={spacingY} fixture={fixtureDef} />
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-sm flex flex-col">
                    <h2 className="text-lg font-semibold text-slate-200 mb-4">Luminous Data (LDC)</h2>
                    <div className="flex-1 flex flex-col items-center justify-center min-h-[300px] border border-slate-800 rounded-lg bg-slate-950 p-4">
                      <PolarChart fixture={fixtureDef} />
                      <div className="mt-4 text-center">
                        <div className="text-sm font-medium text-slate-300">
                          {fixtureDef.beamName}
                        </div>
                        <div className="text-xs text-slate-500 max-w-[200px] mx-auto mt-1">
                          {fixtureDef.candelaC0 ? 'Dual C0 & C90 plane candela curve from ' : 'Cross-section candela curve from '}{fixtureDef.name} IES profile.
                        </div>
                      </div>
                    </div>
                  </div>

                </div>

                <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-sm w-full">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-lg font-semibold text-slate-200">Lifetime Lumen Depreciation Extrapolated</h2>
                    <div className="flex gap-4">
                      <div className="flex items-center gap-2">
                        <div className="w-4 h-0 border-t-2 border-slate-500 border-dashed"></div>
                        <span className="text-xs text-slate-400">Overall Avg</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-4 h-1 bg-purple-500 rounded"></div>
                        <span className="text-xs text-slate-400">Interior Avg</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-red-500"></div>
                        <span className="text-xs text-slate-400">Target Lux</span>
                      </div>
                    </div>
                  </div>
                  
                  <div className="h-[260px] bg-slate-950 rounded-lg border border-slate-800 p-4">
                    <DepreciationChart stats={stats} targetLux={targetLux} fixture={fixtureDef} isGeneratingPDF={false} />
                  </div>
                  
                  <p className="text-xs text-slate-500 mt-4 text-center">
                    Based on empirical test data predicting {fixtureDef.desc}. Calculation uses an exponential fit decay model: α = {fixtureDef.alpha.toExponential(3)}. 
                  </p>
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
