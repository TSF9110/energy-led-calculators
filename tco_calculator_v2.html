const getCandelaVal = (thetaRad, phiRad, fixture) => {
  let exactIdx = (thetaRad * 180 / Math.PI) / fixture.step;
  let idx1 = Math.floor(exactIdx);
  let idx2 = Math.ceil(exactIdx);
  
  const maxIdx = fixture.candelaC0 ? fixture.candelaC0.length - 1 : fixture.candela.length - 1;
  if (idx1 > maxIdx) idx1 = maxIdx;
  if (idx2 > maxIdx) idx2 = maxIdx;
  let weight = exactIdx - idx1;

  if (fixture.candelaC0 && fixture.candelaC90) {
    let c0_1 = fixture.candelaC0[idx1];
    let c0_2 = fixture.candelaC0[idx2];
    let c0 = c0_1 * (1 - weight) + c0_2 * weight;

    let c90_1 = fixture.candelaC90[idx1];
    let c90_2 = fixture.candelaC90[idx2];
    let c90 = c90_1 * (1 - weight) + c90_2 * weight;

    let cos2 = Math.pow(Math.cos(phiRad), 2);
    let sin2 = Math.pow(Math.sin(phiRad), 2);
    return c0 * cos2 + c90 * sin2;
  } else {
    let c1 = fixture.candela[idx1];
    let c2 = fixture.candela[idx2];
    return c1 * (1 - weight) + c2 * weight;
  }
};

const getLuxAtPoint = (x, y, height, spacingX, spacingY, fixture) => {
  let totalLux = 0;
  const effHeight = Math.max(0.1, height - 0.75); 
  
  for (let i = -1; i <= 1; i++) {
    for (let j = -1; j <= 1; j++) {
      let fx = i * spacingX;
      let fy = j * spacingY;
      let dx = x - fx;
      let dy = y - fy;
      let distSq = dx * dx + dy * dy + effHeight * effHeight;
      let dist = Math.sqrt(distSq);
      
      let thetaRad = Math.acos(effHeight / dist);
      let phiRad = Math.atan2(dx, dy); 

      if (thetaRad <= Math.PI/2) {
        let I = getCandelaVal(thetaRad, phiRad, fixture);
        let lux = (I * effHeight / (dist * distSq)) * 1.15;
        totalLux += lux;
      }
    }
  }
  return totalLux;
};

const interpolateColor = (color1, color2, factor) => {
  const result = [
    Math.round(color1[0] + factor * (color2[0] - color1[0])),
    Math.round(color1[1] + factor * (color2[1] - color1[1])),
    Math.round(color1[2] + factor * (color2[2] - color1[2]))
  ];
  return `rgb(${result[0]}, ${result[1]}, ${result[2]})`;
};

const getHeatmapColor = (lux, targetLux, maxLux) => {
  const cRedDark = [153, 27, 27];
  const cRedLight = [252, 165, 165];
  const cWhite = [255, 255, 255];
  const cGreenLight = [187, 247, 208];
  const cGreenDark = [21, 128, 61];

  if (lux < targetLux) {
    const ratio = Math.max(0, lux / targetLux);
    if (ratio < 0.5) return interpolateColor(cRedDark, cRedLight, ratio * 2);
    return interpolateColor(cRedLight, cWhite, (ratio - 0.5) * 2);
  } else {
    const cap = Math.max(targetLux * 1.5, maxLux);
    const ratio = Math.min(1, (lux - targetLux) / (cap - targetLux));
    if (ratio < 0.5) return interpolateColor(cWhite, cGreenLight, ratio * 2);
    return interpolateColor(cGreenLight, cGreenDark, (ratio - 0.5) * 2);
  }
};

const Heatmap = ({ height, spacingX, spacingY, fixture, targetLux, onStatsChange }) => {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    
    const width = canvas.width; 
    const h = canvas.height; 
    
    const sf = 2; 
    const padL = 45 * sf;
    const padB = 35 * sf;
    const padT = 15 * sf;
    const padR = 15 * sf;
    const availW = width - padL - padR;
    const availH = h - padT - padB;
    
    const roomW = spacingX * 3; 
    const roomH = spacingY * 3; 

    const scale = Math.min(availW / roomW, availH / roomH);
    const drawW = roomW * scale;
    const drawH = roomH * scale;

    const offsetX = padL + (availW - drawW) / 2;
    const offsetY = padT + (availH - drawH) / 2;
    
    const resolution = 60; 
    const luxValues = new Float32Array(resolution * resolution);
    
    let minL = Infinity, maxL = -Infinity, sumL = 0;
    let intMinL = Infinity, intMaxL = -Infinity, intSumL = 0, intCount = 0;

    for (let y = 0; y < resolution; y++) {
      for (let x = 0; x < resolution; x++) {
        const px = -1.5 * spacingX + (x / resolution) * roomW;
        const py = -1.5 * spacingY + (y / resolution) * roomH;
        
        const lux = getLuxAtPoint(px, py, height, spacingX, spacingY, fixture);
        luxValues[y * resolution + x] = lux;
        
        if (lux < minL) minL = lux;
        if (lux > maxL) maxL = lux;
        sumL += lux;

        if (px >= -spacingX && px <= spacingX && py >= -spacingY && py <= spacingY) {
          if (lux < intMinL) intMinL = lux;
          if (lux > intMaxL) intMaxL = lux;
          intSumL += lux;
          intCount++;
        }
      }
    }

    const avgL = sumL / (resolution * resolution);
    const intAvgL = intCount > 0 ? intSumL / intCount : 0;
    
    onStatsChange({ 
      overall: { avg: avgL, min: minL, max: maxL },
      interior: { avg: intAvgL, min: intMinL === Infinity ? 0 : intMinL, max: intMaxL === -Infinity ? 0 : intMaxL }
    });

    ctx.clearRect(0, 0, width, h);

    const cellW = drawW / resolution;
    const cellH = drawH / resolution;
    
    for (let y = 0; y < resolution; y++) {
      for (let x = 0; x < resolution; x++) {
        const val = luxValues[y * resolution + x];
        ctx.fillStyle = getHeatmapColor(val, targetLux, maxL);
        ctx.fillRect(offsetX + x * cellW, offsetY + y * cellH, Math.ceil(cellW), Math.ceil(cellH));
      }
    }

    ctx.strokeStyle = 'rgba(18, 134, 66, 0.7)';
    ctx.lineWidth = 0.5 * sf;
    
    const maxCandelaData = fixture.candelaC90 ? Math.max(...fixture.candelaC90) : Math.max(...fixture.candela);
    const physRMax = Math.min(spacingX, spacingY) / 2.2;
    const rMaxScaled = physRMax * scale;

    for (let i = -1; i <= 1; i++) {
      for (let j = -1; j <= 1; j++) {
        const cx = offsetX + ((i * spacingX + 1.5 * spacingX) / roomW) * drawW;
        const cy = offsetY + ((j * spacingY + 1.5 * spacingY) / roomH) * drawH;
        
        if (fixture.shape === 'linear') {
           const rectW = 0.2 * scale; 
           const rectH = fixture.length * scale; 
           ctx.strokeRect(cx - rectW/2, cy - rectH/2, rectW, rectH);
        }
        
        for(let step = 1; step <= 6; step++) {
            const thetaRad = (step / 6) * (Math.PI / 2.5);
            ctx.beginPath();
            for(let a = 0; a <= 360; a += 5) {
                const phiRad = a * Math.PI / 180;
                const candela = getCandelaVal(thetaRad, phiRad, fixture);
                const rVal = (candela / maxCandelaData) * rMaxScaled;
                const px = cx + rVal * Math.sin(phiRad);
                const py = cy - rVal * Math.cos(phiRad); 
                if (a === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.stroke();
        }
        
        for(let a = 0; a < 360; a += 15) {
            ctx.beginPath();
            for(let step = 0; step <= 6; step++) {
                 const thetaRad = (step / 6) * (Math.PI / 2.5);
                 const phiRad = a * Math.PI / 180;
                 const candela = getCandelaVal(thetaRad, phiRad, fixture);
                 const rVal = (candela / maxCandelaData) * rMaxScaled;
                 const px = cx + rVal * Math.sin(phiRad);
                 const py = cy - rVal * Math.cos(phiRad);
                 if (step === 0) ctx.moveTo(px, py);
                 else ctx.lineTo(px, py);
            }
            ctx.stroke();
        }
        
        ctx.beginPath();
        ctx.arc(cx, cy, 3 * sf, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(18, 134, 66, 1)';
        ctx.fill();
      }
    }

    ctx.save();
    ctx.strokeStyle = 'rgba(239, 68, 68, 1)';
    ctx.lineWidth = 2.5 * sf;
    ctx.setLineDash([8 * sf, 6 * sf]);
    ctx.strokeRect(offsetX + drawW/6, offsetY + drawH/6, drawW * (2/3), drawH * (2/3));
    ctx.restore();

    ctx.fillStyle = '#0f172a'; 
    ctx.font = `bold ${11 * sf}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    const steps = 6;
    for (let i = 0; i <= steps; i++) {
      for (let j = 0; j <= steps; j++) {
        const relX = i / steps;
        const relY = j / steps;
        
        const px = offsetX + (10 * sf) + relX * (drawW - 20 * sf);
        const py = offsetY + (10 * sf) + relY * (drawH - 20 * sf);
        
        const realX = -1.5 * spacingX + ((px - offsetX) / drawW) * roomW;
        const realY = -1.5 * spacingY + ((py - offsetY) / drawH) * roomH;
        
        const lux = getLuxAtPoint(realX, realY, height, spacingX, spacingY, fixture);
        
        ctx.shadowColor = 'rgba(255,255,255,0.8)';
        ctx.shadowBlur = 4 * sf;
        ctx.fillText(Math.round(lux), px, py);
        ctx.fillText(Math.round(lux), px, py);
        ctx.shadowBlur = 0; 
      }
    }

    ctx.strokeStyle = '#475569'; 
    ctx.lineWidth = 1 * sf;
    ctx.beginPath();
    ctx.moveTo(offsetX, offsetY);
    ctx.lineTo(offsetX, offsetY + drawH); 
    ctx.lineTo(offsetX + drawW, offsetY + drawH); 
    ctx.stroke();

    ctx.fillStyle = '#94a3b8'; 
    ctx.font = `${11 * sf}px sans-serif`;
    const numTicks = 6;
    for (let i = 0; i <= numTicks; i++) {
      const valX = (i / numTicks) * roomW;
      const valY = (i / numTicks) * roomH;
      
      const cx = offsetX + (i / numTicks) * drawW;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(`${valX.toFixed(1)}m`, cx, offsetY + drawH + (8 * sf));
      ctx.fillRect(cx, offsetY + drawH, 1 * sf, 5 * sf); 

      const cy = offsetY + drawH - (i / numTicks) * drawH; 
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${valY.toFixed(1)}m`, offsetX - (8 * sf), cy);
      ctx.fillRect(offsetX - (5 * sf), cy, 5 * sf, 1 * sf); 
    }

  }, [height, spacingX, spacingY, fixture, targetLux, onStatsChange]);

  return (
    <div className="w-full h-full flex flex-col gap-2 relative">
      <div className="w-full flex-1 relative flex items-center justify-center rounded-lg overflow-hidden bg-gray-50 border border-gray-300">
        <canvas ref={canvasRef} width={1100} height={1000} className="max-w-full max-h-full w-full h-auto bg-white" />
        <div className="absolute top-2 right-2 bg-gray-50/80 backdrop-blur text-xs px-2 py-1 rounded text-gray-700 border border-gray-300 shadow-sm">
          Area: {spacingX * 3}m x {spacingY * 3}m
        </div>
      </div>
      
      <div className="bg-gray-50 border border-gray-300 rounded p-2 flex flex-col gap-1">
        <div className="flex justify-between text-[10px] text-gray-500 font-medium px-1">
          <span>Under Target (Red)</span>
          <span className="text-gray-800">Target: {targetLux} lx</span>
          <span>Over Target (Green)</span>
        </div>
        <div className="h-3 w-full rounded border border-gray-200" style={{
          background: `linear-gradient(to right, 
            ${getHeatmapColor(0, targetLux, targetLux * 2)},
            ${getHeatmapColor(targetLux * 0.5, targetLux, targetLux * 2)},
            ${getHeatmapColor(targetLux, targetLux, targetLux * 2)},
            ${getHeatmapColor(targetLux * 1.5, targetLux, targetLux * 2)},
            ${getHeatmapColor(targetLux * 2, targetLux, targetLux * 2)}
          )`
        }}></div>
      </div>
    </div>
  );
};

const ThreeDView = ({ height, spacingX, spacingY, fixture }) => {
  const containerRef = useRef(null);
  
  useEffect(() => {
    let active = true;
    let renderer, scene, camera, animationId, resizeObserver;
    const container = containerRef.current;

    const initScene = (THREE) => {
      if (!active || !container) return;
      container.innerHTML = ''; 

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf1f5f9);

      const width = container.clientWidth || 800;
      const hHeight = container.clientHeight || 500;
      camera = new THREE.PerspectiveCamera(50, width / hHeight, 0.1, 1000);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
      renderer.setSize(width, hHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      container.appendChild(renderer.domElement);

      const makeTextSprite = (message) => {
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = 'rgba(15, 23, 42, 0.85)'; 
        ctx.fillRect(0, 0, 128, 64);
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 4;
        ctx.strokeRect(0, 0, 128, 64);
        
        ctx.fillStyle = '#f8fafc'; 
        ctx.font = 'bold 28px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(message, 64, 32);
        
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
        const sprite = new THREE.Sprite(spriteMaterial);
        
        const spriteScale = Math.max(2.5, Math.max(spacingX, spacingY) * 0.15);
        sprite.scale.set(spriteScale * 2, spriteScale, 1); 
        return sprite;
      };

      // Floor
      const floorW = spacingX * 4;
      const floorH = spacingY * 4;
      const planeGeo = new THREE.PlaneGeometry(floorW, floorH);
      const planeMat = new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.8 });
      const plane = new THREE.Mesh(planeGeo, planeMat);
      plane.rotation.x = -Math.PI / 2;
      plane.receiveShadow = true;
      scene.add(plane);

      // Grid Helpers
      const maxFloor = Math.max(floorW, floorH);
      const gridHelper = new THREE.GridHelper(maxFloor, Math.ceil(maxFloor / (Math.min(spacingX, spacingY)/2)), 0x475569, 0xf8fafc);
      gridHelper.position.y = 0.05;
      scene.add(gridHelper);

      // Distance Axis Markers
      const numTicks = 3;
      const roomDimX = spacingX * 3;
      const roomDimY = spacingY * 3;
      for (let i = 0; i <= numTicks; i++) {
        const xPos = -1.5 * spacingX + (i / numTicks) * roomDimX;
        const xLabel = makeTextSprite(`${(xPos + 1.5 * spacingX).toFixed(1)}m`);
        xLabel.position.set(xPos, 0.5, 1.5 * spacingY + 1.5); 
        scene.add(xLabel);

        const zPos = -1.5 * spacingY + (i / numTicks) * roomDimY;
        const zLabel = makeTextSprite(`${(roomDimY - (zPos + 1.5 * spacingY)).toFixed(1)}m`);
        zLabel.position.set(-1.5 * spacingX - 1.5, 0.5, zPos); 
        scene.add(zLabel);
      }

      // Interior Area Box
      const boxGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(spacingX * 2, spacingY * 2));
      const boxMat = new THREE.LineDashedMaterial({ color: 0xef4444, dashSize: 0.5, gapSize: 0.3, linewidth: 2 });
      const boxMesh = new THREE.LineSegments(boxGeo, boxMat);
      boxMesh.computeLineDistances(); 
      boxMesh.rotation.x = -Math.PI / 2;
      boxMesh.position.y = 0.1; 
      scene.add(boxMesh);

      const ldcMat = new THREE.MeshBasicMaterial({ 
        color: 0x128642,
        transparent: true, 
        opacity: 0.08, 
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const wireMat = new THREE.MeshBasicMaterial({
        color: 0x128642,
        wireframe: true,
        transparent: true,
        opacity: 0.5
      });

      // Construct customized LDC geometry
      let ldcGeo;
      if (fixture.candelaC0 && fixture.candelaC90) {
        ldcGeo = new THREE.SphereGeometry(1, 64, 32, 0, Math.PI * 2, 0, Math.PI / 2);
        const pos = ldcGeo.attributes.position;
        const maxCandela = Math.max(...fixture.candelaC90);
        const scaleFactor = height / maxCandela;
        
        for (let i = 0; i < pos.count; i++) {
            const vx = pos.getX(i);
            const vy = pos.getY(i);
            const vz = pos.getZ(i);
            
            const rBase = Math.sqrt(vx*vx + vy*vy + vz*vz);
            const thetaRad = Math.acos(vy / rBase); 
            const phiRad = Math.atan2(vx, vz);
            
            const candela = getCandelaVal(thetaRad, phiRad, fixture);
            const rNew = candela * scaleFactor;
            
            pos.setXYZ(i, (vx/rBase) * rNew, -(vy/rBase) * rNew, (vz/rBase) * rNew);
        }
        ldcGeo.computeVertexNormals();
      } else {
        const scaleFactor = height / fixture.candela[0]; 
        const points = [];
        for (let k = fixture.candela.length - 1; k >= 0; k--) {
          const angleRad = (k * fixture.step) * Math.PI / 180;
          const r = fixture.candela[k] * scaleFactor;
          const ptX = r * Math.sin(angleRad);
          const ptY = -r * Math.cos(angleRad);
          points.push(new THREE.Vector2(ptX, ptY));
        }
        ldcGeo = new THREE.LatheGeometry(points, 32);
      }

      const intensity = Math.max(1.5, fixture.lumen / 6000); 
      const beamAngle = fixture.beamAngle;

      for (let i = -1; i <= 1; i++) {
        for (let j = -1; j <= 1; j++) {
          const x = i * spacingX;
          const z = j * spacingY;

          let fixGeo;
          if (fixture.shape === 'linear') {
             fixGeo = new THREE.BoxGeometry(0.15, 0.1, fixture.length); 
          } else {
             fixGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.2, 16);
          }
          
          const fixMat = new THREE.MeshBasicMaterial({ color: 0x94a3b8 });
          const fixtureMesh = new THREE.Mesh(fixGeo, fixMat);
          fixtureMesh.position.set(x, height, z);
          scene.add(fixtureMesh);

          const spotLight = new THREE.SpotLight(0xffffff, intensity);
          spotLight.position.set(x, height, z);
          spotLight.angle = beamAngle;
          spotLight.penumbra = 0.4;
          spotLight.decay = 1.5;
          spotLight.distance = height * 4;
          spotLight.castShadow = true;
          spotLight.shadow.mapSize.width = 1024;
          spotLight.shadow.mapSize.height = 1024;

          const target = new THREE.Object3D();
          target.position.set(x, 0, z);
          scene.add(target);
          spotLight.target = target;
          scene.add(spotLight);

          const ldcMesh = new THREE.Mesh(ldcGeo, ldcMat);
          ldcMesh.position.set(x, height, z);
          scene.add(ldcMesh);

          const wireMesh = new THREE.Mesh(ldcGeo, wireMat);
          wireMesh.position.set(x, height, z);
          scene.add(wireMesh);
        }
      }

      const ambient = new THREE.AmbientLight(0xffffff, 0.2);
      scene.add(ambient);

      let theta = Math.PI / 4;
      let phi = Math.PI / 3;
      let radius = Math.max(Math.max(spacingX, spacingY) * 5.5, height * 3.5, 40);
      
      const updateCamera = () => {
        camera.position.x = radius * Math.sin(phi) * Math.sin(theta);
        camera.position.y = radius * Math.cos(phi);
        camera.position.z = radius * Math.sin(phi) * Math.cos(theta);
        camera.lookAt(0, 0, 0);
      };
      updateCamera();

      let isDragging = false;
      let prevPos = { x: 0, y: 0 };

      const onMouseDown = (e) => {
        isDragging = true;
        prevPos = { x: e.clientX, y: e.clientY };
      };
      const onMouseUp = () => isDragging = false;
      const onMouseMove = (e) => {
        if (!isDragging) return;
        const delta = { x: e.clientX - prevPos.x, y: e.clientY - prevPos.y };
        theta -= delta.x * 0.01;
        phi -= delta.y * 0.01;
        phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, phi)); 
        updateCamera();
        prevPos = { x: e.clientX, y: e.clientY };
      };
      
      const onWheel = (e) => {
        e.preventDefault();
        radius += e.deltaY * 0.05;
        radius = Math.max(5, Math.min(150, radius));
        updateCamera();
      };

      container.addEventListener('mousedown', onMouseDown);
      container.addEventListener('mouseup', onMouseUp);
      container.addEventListener('mouseleave', onMouseUp);
      container.addEventListener('mousemove', onMouseMove);
      container.addEventListener('wheel', onWheel, { passive: false });

      resizeObserver = new ResizeObserver(() => {
        if (!container || !camera || !renderer) return;
        const w = container.clientWidth || 800;
        const h = container.clientHeight || 500;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });
      resizeObserver.observe(container);

      const animate = () => {
        if (!active) return;
        animationId = requestAnimationFrame(animate);
        renderer.render(scene, camera);
      };
      animate();
    };

    if (window.THREE) {
      initScene(window.THREE);
    } else {
      const script = document.createElement('script');
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";
      script.onload = () => { if (active) initScene(window.THREE); };
      document.head.appendChild(script);
    }

    return () => {
      active = false;
      if (animationId) cancelAnimationFrame(animationId);
      if (resizeObserver && container) resizeObserver.unobserve(container);
      if (renderer) renderer.dispose();
    };
  }, [height, spacingX, spacingY, fixture]);

  return (
    <div className="w-full h-full relative rounded-lg overflow-hidden bg-white border border-gray-300">
      <div ref={containerRef} className="w-full h-full cursor-move" />
      <div className="absolute top-2 left-2 bg-gray-50/80 backdrop-blur text-xs px-2 py-1 rounded text-gray-700 border border-gray-300 pointer-events-none shadow-sm flex flex-col gap-1">
        <span>3x3 Grid Layout</span>
        <span className="text-[10px] text-red-400 font-bold tracking-wide">Striped Red: Interior Bounds</span>
      </div>
      <div className="absolute bottom-2 left-2 bg-gray-50/80 backdrop-blur text-xs px-2 py-1 rounded text-gray-500 border border-gray-300 pointer-events-none shadow-sm">
        Drag to rotate • Scroll to zoom
      </div>
    </div>
  );
};

const PolarChart = ({ fixture }) => {
  const dataC90 = fixture.candelaC90 || fixture.candela;
  const dataC0 = fixture.candelaC0; 
  const maxCandela = Math.max(...dataC90);
  const ringStep = Math.ceil(maxCandela / 3 / 1000) * 1000 || 1000;
  
  const generatePath = (data, side) => {
    let path = 'M 0 0 ';
    data.forEach((val, i) => {
      const angleDeg = i * fixture.step;
      const angleRad = (side === 'left' ? -angleDeg : angleDeg) * Math.PI / 180;
      const r = (val / (ringStep * 3)) * 120;
      const x = r * Math.sin(angleRad);
      const y = r * Math.cos(angleRad);
      path += `L ${x} ${y} `;
    });
    return path;
  };

  return (
    <div className="w-full h-full flex items-center justify-center">
      <svg viewBox="-140 -20 280 160" preserveAspectRatio="xMidYMid meet" className="w-full h-full max-h-full">
        {[ringStep, ringStep * 2, ringStep * 3].map(val => {
          const r = (val / (ringStep * 3)) * 120;
          return (
            <g key={val}>
              <circle cx="0" cy="0" r={r} fill="none" stroke="#334155" strokeWidth="1" strokeDasharray="4 4" />
              <text x={r + 2} y="10" fontSize="8" fill="#64748b">{val} cd</text>
            </g>
          );
        })}
        {[-90, -60, -30, 0, 30, 60, 90].map(angle => {
          const rad = angle * Math.PI / 180;
          return (
            <line key={angle} x1="0" y1="0" x2={130 * Math.sin(rad)} y2={130 * Math.cos(rad)} stroke="#334155" strokeWidth="1" />
          )
        })}
        <path d={generatePath(dataC90, 'right')} fill="rgba(18, 134, 66, 0.15)" stroke="#128642" strokeWidth="2" />
        <path d={generatePath(dataC90, 'left')} fill="rgba(18, 134, 66, 0.15)" stroke="#128642" strokeWidth="2" />
        
        {dataC0 && (
          <>
            <path d={generatePath(dataC0, 'right')} fill="none" stroke="#3aaa6a" strokeWidth="2" strokeDasharray="4 4" />
            <path d={generatePath(dataC0, 'left')} fill="none" stroke="#3aaa6a" strokeWidth="2" strokeDasharray="4 4" />
          </>
        )}
      </svg>
    </div>
  );
};

const DepreciationChart = ({ stats, targetLux, fixture, isGeneratingPDF }) => {
  const width = 800;
  const height = 350; 
  const padding = { top: 20, right: 30, bottom: 80, left: 50 }; 
  
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;
  const maxHours = 120000;
  
  const avgLuxOverall = stats.overall.avg;
  const avgLuxInterior = stats.interior.avg;
  const maxY = Math.max(avgLuxInterior * 1.1, avgLuxOverall * 1.1, targetLux * 1.2, 100);

  let pathOverall = '';
  let pathInterior = '';

  for(let t = 0; t <= maxHours; t += 2000) {
    const lOverall = avgLuxOverall * Math.exp(-fixture.alpha * t);
    const lInterior = avgLuxInterior * Math.exp(-fixture.alpha * t);
    
    const x = padding.left + (t / maxHours) * innerW;
    
    const yOverall = padding.top + innerH - (lOverall / maxY) * innerH;
    if (t === 0) pathOverall += `M ${x} ${yOverall} `;
    else pathOverall += `L ${x} ${yOverall} `;

    const yInterior = padding.top + innerH - (lInterior / maxY) * innerH;
    if (t === 0) pathInterior += `M ${x} ${yInterior} `;
    else pathInterior += `L ${x} ${yInterior} `;
  }

  let crossingTime = 0;
  if (avgLuxInterior > targetLux) {
    crossingTime = -Math.log(targetLux / avgLuxInterior) / fixture.alpha;
  }
  const crossingValid = crossingTime > 0 && crossingTime <= maxHours;
  const cx = padding.left + (crossingTime / maxHours) * innerW;
  const ty = padding.top + innerH - (targetLux / maxY) * innerH;

  return (
    <div className={`w-full flex items-center justify-center relative ${isGeneratingPDF ? '' : 'h-full'}`} style={{position:'relative'}}>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet" className="block text-xs font-sans" style={{ width:"100%", height:"auto", display:"block", overflow:"hidden" }}>
        <line x1={padding.left} y1={padding.top} x2={padding.left} y2={height - padding.bottom} stroke="#475569" strokeWidth="2" />
        <line x1={padding.left} y1={height - padding.bottom} x2={width - padding.right} y2={height - padding.bottom} stroke="#475569" strokeWidth="2" />
        
        {[0, 0.25, 0.5, 0.75, 1].map(frac => {
          const val = frac * maxY;
          const y = padding.top + innerH - frac * innerH;
          return (
            <g key={frac}>
              <line x1={padding.left - 5} y1={y} x2={width - padding.right} y2={y} stroke="#334155" strokeDasharray={frac===0?"":"4 4"} />
              <text x={padding.left - 10} y={y + 4} fill="#6b7280" textAnchor="end">{Math.round(val)}</text>
            </g>
          )
        })}

        {[0, 25000, 50000, 75000, 100000, 120000].map(h => {
          const x = padding.left + (h / maxHours) * innerW;
          return (
            <g key={h}>
              <line x1={x} y1={height - padding.bottom} x2={x} y2={height - padding.bottom + 5} stroke="#475569" />
              <text x={x} y={height - padding.bottom + 25} fill="#6b7280" textAnchor="middle">{(h/1000)}k hrs</text>
            </g>
          )
        })}

        <path d={pathOverall} fill="none" stroke="#64748b" strokeWidth="2" strokeDasharray="4 4" />
        <text x={padding.left + 10} y={padding.top + 25} fill="#64748b">Overall Area</text>

        <path d={pathInterior} fill="none" stroke="#1a5fa8" strokeWidth="3" />
        <text x={padding.left + 10} y={padding.top + 10} fill="#3b82f6" fontWeight="bold">Core Interior Area</text>

        <line x1={padding.left} y1={ty} x2={width - padding.right} y2={ty} stroke="#ef4444" strokeWidth="2" strokeDasharray="6 4" />
        <text x={width - padding.right - 10} y={ty - 8} fill="#ef4444" textAnchor="end" fontWeight="bold">Target: {targetLux} Lux</text>

        {crossingValid && (
          <g>
            <circle cx={cx} cy={ty} r="5" fill="#ef4444" />
            <line x1={cx} y1={ty} x2={cx} y2={height - padding.bottom} stroke="#ef4444" strokeWidth="1" strokeDasharray="4 4" />
            <rect x={cx - 40} y={height - padding.bottom - 40} width="80" height="24" rx="4" fill="#1e293b" stroke="#ef4444" />
            <text x={cx} y={height - padding.bottom - 24} fill="#f8fafc" textAnchor="middle" fontWeight="bold">
              {Math.round(crossingTime).toLocaleString()}h
            </text>
          </g>
        )}
      </svg>
    </div>
  );
};

const KpiRow = ({ title, stats, yearsToFailure, isInterior, isGeneratingPDF }) => {
  const cardBase = `border rounded-xl flex flex-col justify-between shadow-sm transition-colors ${isInterior ? 'bg-blue-900/10 border-blue-800/50' : 'bg-gray-50 border-gray-200'}`;
  const cardPad  = isGeneratingPDF ? 'p-3' : 'p-4';
  const cardH    = isGeneratingPDF ? {} : { minHeight: '80px' };
  const labelCls = `text-[11px] font-semibold uppercase tracking-wide text-gray-400 mb-2`;
  const valueCls = `text-2xl font-bold leading-none ${isInterior ? 'text-blue-600' : 'text-gray-800'}`;
  return (
    <div className={`${isGeneratingPDF ? 'mt-2 space-y-1' : 'mt-4 space-y-2'}`}>
      <h3 className={`${isGeneratingPDF ? 'text-[11px]' : 'text-sm'} font-semibold text-gray-600 flex items-center gap-2`}>
        {isInterior
          ? <div className="w-3 h-3 border border-red-400 border-dashed rounded-sm shrink-0" />
          : <Grid size={14} className="text-gray-400 shrink-0" />}
        {title}
      </h3>
      <div className={`grid grid-cols-2 md:grid-cols-4 ${isGeneratingPDF ? 'gap-2' : 'gap-3'}`}>
        <div className={`${cardBase} ${cardPad}`} style={cardH}>
          <div className={labelCls}>Day 1 Avg Lux</div>
          <div className={valueCls}>{Math.round(stats.avg)}</div>
        </div>
        <div className={`${cardBase} ${cardPad}`} style={cardH}>
          <div className={labelCls}>Uniformity (Min/Avg)</div>
          <div className={valueCls}>{stats.avg > 0 ? (stats.min / stats.avg).toFixed(2) : '0.00'}</div>
        </div>
        <div className={`${cardBase} ${cardPad}`} style={cardH}>
          <div className={labelCls}>Max Lux</div>
          <div className={valueCls}>{Math.round(stats.max)}</div>
        </div>
        <div className={`${cardBase} ${cardPad}`} style={cardH}>
          <div className={labelCls}>Est. Maint. Cycle</div>
          <div className="text-2xl font-bold leading-none text-red-400">{yearsToFailure > 0 ? `${yearsToFailure.toFixed(1)} yrs` : 'Fail'}</div>
        </div>
      </div>
    </div>
  );
};


function App() {
  const [modelId, setModelId] = useState('g5');
  const [lumenId, setLumenId] = useState('15k');
  const [beamId, setBeamId] = useState('wb');
  const [height, setHeight] = useState(10.0);
  const [spacingX, setSpacingX] = useState(10);
  const [spacingY, setSpacingY] = useState(10);
  const [targetLux, setTargetLux] = useState(75);
  const [viewMode, setViewMode] = useState('2d');
  const [stats, setStats] = useState({ 
    overall: { avg: 0, min: 0, max: 0 },
    interior: { avg: 0, min: 0, max: 0 }
  });
  const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
  const [logoError, setLogoError] = useState(false);

  const handleModelChange = (newModel) => {
    setModelId(newModel);
    const validLumens = Object.keys(FIXTURE_MODELS[newModel].lumens);
    const newLumen = validLumens[0];
    setLumenId(newLumen);
    const validBeams = Object.keys(FIXTURE_MODELS[newModel].lumens[newLumen].beams);
    setBeamId(validBeams[0]);
    if (newModel === 'wt120c') {
      setHeight(3.0); setSpacingX(5); setSpacingY(5);
    } else {
      setHeight(10.0); setSpacingX(10); setSpacingY(10);
    }
  };

  const handleLumenChange = (newLumen) => {
    setLumenId(newLumen);
    const validBeams = Object.keys(FIXTURE_MODELS[modelId].lumens[newLumen].beams);
    if (!validBeams.includes(beamId)) setBeamId(validBeams[0]);
  };

  const fixtureDef = useMemo(() => {
    const currentModel = FIXTURE_MODELS[modelId];
    const currentLumen = currentModel.lumens[lumenId];
    const currentBeam = currentLumen.beams[beamId];
    return {
       id: `${modelId}_${lumenId}_${beamId}`,
       name: currentModel.name,
       desc: currentModel.desc,
       alpha: currentModel.alpha,
       shape: currentModel.shape,
       length: currentLumen.length || 0,
       candela: currentBeam.candela || currentBeam.data,
       candelaC0: currentBeam.candelaC0,
       candelaC90: currentBeam.candelaC90,
       step: currentBeam.step,
       beamAngle: currentBeam.angle,
       beamName: currentBeam.name,
       lumenName: currentLumen.name,
       lumen: parseInt(lumenId.replace('k', '000').replace('s', '000')) || 15000
    };
  }, [modelId, lumenId, beamId]);

  const yearsToFailureOverall = useMemo(() => {
    if (stats.overall.avg <= targetLux) return 0;
    return (-Math.log(targetLux / stats.overall.avg) / fixtureDef.alpha) / (12 * 365);
  }, [stats.overall.avg, targetLux, fixtureDef.alpha]);

  const yearsToFailureInterior = useMemo(() => {
    if (stats.interior.avg <= targetLux) return 0;
    return (-Math.log(targetLux / stats.interior.avg) / fixtureDef.alpha) / (12 * 365);
  }, [stats.interior.avg, targetLux, fixtureDef.alpha]);

  const handleDownloadPDF = async () => {
    window.scrollTo(0, 0);
    setIsGeneratingPDF(true);
    try {
      if (!window.html2pdf) {
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
          script.onload = resolve;
          script.onerror = () => reject(new Error("Failed to load html2pdf"));
          document.head.appendChild(script);
        });
      }
      setTimeout(() => {
        window.scrollTo(0, 0);
        const element = document.getElementById('report-container');
        const opt = {
          margin: [15, 0, 15, 0],
          filename: `Lighting_Report_${fixtureDef.name.replace(/[^a-z0-9]/gi, '_')}.pdf`,
          image: { type: 'jpeg', quality: 1.0 },
          html2canvas: { scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#ffffff', windowWidth: 800, width: 800, x: 0, y: 0, scrollY: 0, scrollX: 0 },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        window.html2pdf().set(opt).from(element).save()
          .then(() => setIsGeneratingPDF(false))
          .catch((err) => { console.error('PDF error:', err); setIsGeneratingPDF(false); });
      }, 1500);
    } catch (err) {
      console.error("PDF Failed", err);
      setIsGeneratingPDF(false);
    }
  };

  const ChevronRight = () => (
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M9 18l6-6-6-6"/>
    </svg>
  );

  return (
    <div className="min-h-screen font-sans text-gray-800" style={{background:'#f3f4f6'}}>

      {/* PDF Overlay */}
      {isGeneratingPDF && (
        <div className="fixed inset-0 z-[99999] flex flex-col items-center justify-center" style={{background:'rgba(255,255,255,0.92)'}}>
          <div className="w-12 h-12 border-4 border-t-transparent rounded-full animate-spin mb-4" style={{borderColor:'#15803d', borderTopColor:'transparent'}}></div>
          <h2 className="text-xl font-bold text-gray-900">Generating PDF Report...</h2>
          <p className="text-gray-500 mt-2">Processing high-resolution charts and lighting data.</p>
        </div>
      )}

      {/* ========== BROWSER MODE ========== */}
      {!isGeneratingPDF && (
        <>
          {/* Page Header */}
          <div className="bg-white border-b border-gray-200 px-6 py-4">
            <div className="max-w-screen-xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-3">
                {!logoError ? (
                  <img
                    src="https://energy-led.co.za/wp-content/uploads/2025/04/energy-led-logo1.png"
                    alt="Energy LED"
                    onError={() => setLogoError(true)}
                    style={{height:'32px', width:'auto', display:'block'}}
                  />
                ) : (
                  <div className="w-9 h-9 rounded-lg flex items-center justify-center" style={{background:'#15803d'}}>
                    <Sun size={18} style={{color:'white'}} />
                  </div>
                )}
                <div>
                  <h1 className="text-xl font-bold text-gray-900">Light Simulator</h1>
                  <p className="text-sm text-gray-500">Simulate illuminance distribution using real IES photometric data.</p>
                </div>
              </div>
              <button
                onClick={handleDownloadPDF}
                disabled={isGeneratingPDF}
                className="flex items-center gap-2 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors disabled:opacity-50 shadow-sm"
                style={{background:'#15803d'}}
              >
                <Download size={15} />
                Download PDF
              </button>
            </div>
          </div>

          {/* Main Content */}
          <div className="px-6 py-5 max-w-screen-xl mx-auto">

            {/* Section 1 — Fixture Family */}
            <div className="mb-5">
              <div className="flex items-center gap-2 mb-3">
                <span className="text-white text-[11px] font-bold px-2 py-0.5 rounded" style={{background:'#111827'}}>1</span>
                <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">SELECT FIXTURE FAMILY</span>
                <ChevronRight />
              </div>
              <div className="flex gap-2 flex-wrap">
                {Object.entries(FIXTURE_MODELS).map(([key, m]) => (
                  <button
                    key={key}
                    onClick={() => handleModelChange(key)}
                    className="px-4 py-2 text-sm font-medium rounded-lg border transition-all"
                    style={modelId === key
                      ? {background:'#15803d', borderColor:'#15803d', color:'white'}
                      : {background:'white', borderColor:'#d1d5db', color:'#4b5563'}}
                  >{m.name}</button>
                ))}
              </div>
            </div>

            {/* Two-column layout */}
            <div className="grid gap-4" style={{gridTemplateColumns:'280px 1fr', alignItems:'start'}}>

              {/* ===== LEFT: Simulator Parameters ===== */}
              <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                <div className="flex items-center gap-2 px-4 py-3 border-b border-gray-200">
                  <Settings size={15} style={{color:'#15803d'}} />
                  <span className="text-sm font-bold text-gray-800">Simulator Parameters</span>
                </div>
                <div className="p-4">

                  {/* Beam Distribution */}
                  <div className="mb-4">
                    <p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Beam Distribution</p>
                    <div className="grid grid-cols-2 gap-2">
                      {Object.entries(FIXTURE_MODELS[modelId].lumens[lumenId].beams).map(([key, b]) => (
                        <button
                          key={key}
                          onClick={() => setBeamId(key)}
                          className="py-2 px-2 rounded-lg text-xs font-medium border transition-all"
                          style={beamId === key
                            ? {background:'#15803d', borderColor:'#15803d', color:'white'}
                            : {background:'#f9fafb', borderColor:'#e5e7eb', color:'#6b7280'}}
                        >{b.name}</button>
                      ))}
                    </div>
                  </div>

                  {/* Est. Life */}
                  <div className="flex items-center gap-2 rounded-lg px-3 py-2 mb-4" style={{background:'#f9fafb', border:'1px solid #f3f4f6'}}>
                    <Info size={13} style={{color:'#9ca3af', flexShrink:0}} />
                    <p className="text-xs text-gray-500">Est. Life: {fixtureDef.desc}</p>
                  </div>

                  {/* Mounting & Spacing */}
                  <div className="border-t border-gray-100 pt-4">
                    <p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3 flex items-center gap-1">
                      <ArrowDownToLine size={11} /> Mounting &amp; Spacing
                    </p>
                    <div className="space-y-4">
                      <div>
                        <div className="flex justify-between mb-1">
                          <span className="text-xs text-gray-500">Mounting Height</span>
                          <span className="text-xs font-bold" style={{color:'#15803d'}}>{height.toFixed(1)} m</span>
                        </div>
                        <input type="range" min="2" max="25" step="0.1" value={height}
                          onChange={e => setHeight(parseFloat(e.target.value))}
                          className="w-full appearance-none cursor-pointer accent-green-700"
                          style={{height:'6px', borderRadius:'9999px', background:'#e5e7eb'}} />
                        <p className="text-[10px] text-gray-400 text-right mt-0.5">0.75m Ref. Plane Calculated</p>
                      </div>
                      <div>
                        <div className="flex justify-between mb-1">
                          <span className="text-xs text-gray-500">Luminaire Spacing (In Row)</span>
                          <span className="text-xs font-bold text-blue-600">{spacingX} m</span>
                        </div>
                        <input type="range" min="3" max="30" step="0.5" value={spacingX}
                          onChange={e => setSpacingX(parseFloat(e.target.value))}
                          className="w-full appearance-none cursor-pointer accent-blue-600"
                          style={{height:'6px', borderRadius:'9999px', background:'#e5e7eb'}} />
                      </div>
                      <div>
                        <div className="flex justify-between mb-1">
                          <span className="text-xs text-gray-500">Row Spacing (Distance)</span>
                          <span className="text-xs font-bold text-indigo-600">{spacingY} m</span>
                        </div>
                        <input type="range" min="3" max="30" step="0.5" value={spacingY}
                          onChange={e => setSpacingY(parseFloat(e.target.value))}
                          className="w-full appearance-none cursor-pointer accent-indigo-600"
                          style={{height:'6px', borderRadius:'9999px', background:'#e5e7eb'}} />
                      </div>
                    </div>
                  </div>

                  {/* Performance Target */}
                  <div className="border-t border-gray-100 pt-4 mt-4">
                    <p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3 flex items-center gap-1">
                      <Activity size={11} /> Performance Target
                    </p>
                    <div>
                      <div className="flex justify-between mb-1">
                        <span className="text-xs text-gray-500">Target Lux (Maint.)</span>
                        <span className="text-xs font-bold text-red-400">{targetLux}</span>
                      </div>
                      <input type="range" min="50" max="500" step="25" value={targetLux}
                        onChange={e => setTargetLux(parseInt(e.target.value))}
                        className="w-full appearance-none cursor-pointer accent-red-500"
                        style={{height:'6px', borderRadius:'9999px', background:'#e5e7eb'}} />
                    </div>

                </div>
              </div>

              {/* ===== RIGHT: Results Panel ===== */}
              <div className="space-y-4">

                {/* Section 2 — Lumen Output */}
                <div>
                  <div className="flex items-center gap-2 mb-3">
                    <span className="text-white text-[11px] font-bold px-2 py-0.5 rounded" style={{background:'#111827'}}>2</span>
                    <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">SELECT LUMEN OUTPUT</span>
                    <ChevronRight />
                  </div>
                  <div className="flex gap-2 flex-wrap">
                    {Object.entries(FIXTURE_MODELS[modelId].lumens).map(([key, l]) => (
                      <button
                        key={key}
                        onClick={() => handleLumenChange(key)}
                        className="px-4 py-2 text-sm font-medium rounded-lg border transition-all"
                        style={lumenId === key
                          ? {background:'#15803d', borderColor:'#15803d', color:'white'}
                          : {background:'white', borderColor:'#d1d5db', color:'#4b5563'}}
                      >{l.name}</button>
                    ))}
                  </div>
                </div>

                {/* Results Card */}
                <div className="bg-white border border-gray-200 rounded-xl p-5 space-y-5">

                  {/* Info Box */}
                  <div className="rounded-lg p-4" style={{background:'#f9fafb', border:'1px solid #e5e7eb'}}>
                    <div className="flex items-start gap-3">
                      <Info size={18} style={{color:'#15803d', flexShrink:0, marginTop:'2px'}} />
                      <div>
                        <h3 className="text-sm font-semibold text-gray-800 mb-1">Why evaluate the Core Interior Area?</h3>
                        <p className="text-xs text-gray-500 leading-relaxed">
                          In a real-world layout, the lighting grid extends continuously across the ceiling. Simulating only a standalone 3×3 sample creates dark "edge drop-offs" on the outer perimeter, artificially lowering the average lux. By isolating the <strong className="text-gray-700">Core Interior Area</strong> (bounded between the outer fixtures, marked by the <span style={{display:'inline-block',width:'20px',borderTop:'1.5px dashed #f87171',verticalAlign:'middle',margin:'0 2px'}}></span> red dashed lines), we eliminate these false edges for an accurate operational representation.
                        </p>
                      </div>
                    </div>
                  </div>

                  <KpiRow title="Overall Area (Including Outer Edges)" stats={stats.overall} yearsToFailure={yearsToFailureOverall} isInterior={false} isGeneratingPDF={false} />
                  <KpiRow title="Core Interior Area (Continuous Grid Simulation)" stats={stats.interior} yearsToFailure={yearsToFailureInterior} isInterior={true} isGeneratingPDF={false} />
                </div>

                {/* Floor Layout & LDC */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                  <div className="lg:col-span-2 bg-white border border-gray-200 rounded-xl p-5 flex flex-col">
                    <div className="flex items-center justify-between mb-4">
                      <h2 className="text-sm font-semibold text-gray-700">Floor Layout Illumination (3×3 Grid)</h2>
                      <div className="flex gap-2">
                        <button
                          onClick={() => setViewMode('2d')}
                          className="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-md transition-colors"
                          style={viewMode === '2d'
                            ? {background:'rgba(21,128,61,0.12)', color:'#15803d', border:'1px solid rgba(21,128,61,0.3)'}
                            : {background:'#f3f4f6', color:'#6b7280'}}
                        >
                          <Grid size={13} /> 2D Map
                        </button>
                        <button
                          onClick={() => setViewMode('3d')}
                          className="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-md transition-colors"
                          style={viewMode === '3d'
                            ? {background:'rgba(21,128,61,0.12)', color:'#15803d', border:'1px solid rgba(21,128,61,0.3)'}
                            : {background:'#f3f4f6', color:'#6b7280'}}
                        >
                          <Box size={13} /> 3D Room
                        </button>
                      </div>

                    <div className="flex-1 min-h-[350px] relative">

                    </div>

                      <PolarChart fixture={fixtureDef} />
                      <div className="mt-4 text-center">
                        <div className="text-sm font-medium text-gray-700">{fixtureDef.beamName}</div>
                        <div className="text-xs text-gray-400 max-w-[200px] mx-auto mt-1">

                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-sm font-semibold text-gray-700">Lifetime Lumen Depreciation Extrapolated</h2>
                    <div className="flex gap-4">
                      <div className="flex items-center gap-2">
                        <div style={{width:'16px', height:'0', borderTop:'2px dashed #64748b'}}></div>
                        <span className="text-xs text-gray-500">Overall Avg</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <div style={{width:'16px', height:'4px', borderRadius:'2px', background:'#15803d'}}></div>
                        <span className="text-xs text-gray-500">Interior Avg</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <div style={{width:'12px', height:'12px', borderRadius:'50%', background:'#ef4444'}}></div>
                        <span className="text-xs text-gray-500">Target Lux</span>
                      </div>
                    </div>
                  </div>
                  <div className="rounded-lg border border-gray-200 p-2" style={{background:'#f9fafb', position:'relative'}}>
                    <DepreciationChart stats={stats} targetLux={targetLux} fixture={fixtureDef} isGeneratingPDF={false} />
                  </div>
                  <p className="text-xs text-gray-400 mt-4 text-center">
                    Based on empirical test data predicting {fixtureDef.desc}. Calculation uses an exponential fit decay model: α = {fixtureDef.alpha.toExponential(3)}.
                  </p>
                </div>

              </div>
            </div>
          </div>
        </>
      )}

      {/* ========== PDF MODE ========== */}
      {isGeneratingPDF && (
        <div id="report-container" className="w-[800px] box-border px-8 py-4 bg-white text-gray-800 mx-auto">

          {/* PAGE 1 */}
          <div className="w-full">
            <div className="flex justify-between items-end border-b-2 border-gray-200 pb-2">
              <div className="flex flex-col items-start">
                {!logoError ? (
                  <div className="bg-white p-2 rounded-lg mb-2 inline-block">
                    <img src="https://energy-led.co.za/wp-content/uploads/2025/04/energy-led-logo1.png" alt="Energy LED" crossOrigin="anonymous" style={{height:'40px', width:'auto', display:'block'}} onError={() => setLogoError(true)} />
                  </div>
                ) : (
                  <div className="text-2xl font-bold mb-2" style={{color:'#15803d'}}>Energy LED</div>
                )}
                <h1 className="text-xl font-bold text-gray-900">Lighting Simulation Report</h1>
              </div>
              <div className="text-right text-gray-500 mb-1">
                <p className="font-bold text-lg" style={{color:'#15803d'}}>{fixtureDef.name}</p>
                <p className="text-xs mt-1">Generated: {new Date().toLocaleDateString()}</p>
              </div>
            </div>

            <div className="grid grid-cols-2 gap-3 mt-4 bg-gray-50 border border-gray-200 rounded-xl p-3">
              <div>
                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 border-b border-gray-200 pb-1">Configuration Inputs</h3>
                <dl className="space-y-1.5 text-sm">
                  <div className="flex justify-between"><dt className="text-gray-500">Luminaire Model:</dt><dd className="font-semibold text-gray-900">{fixtureDef.name}</dd></div>
                  <div className="flex justify-between"><dt className="text-gray-500">Lumen Output:</dt><dd className="font-semibold text-gray-900">{fixtureDef.lumenName}</dd></div>
                  <div className="flex justify-between"><dt className="text-gray-500">Beam Distribution:</dt><dd className="font-semibold text-gray-900">{fixtureDef.beamName}</dd></div>
                  <div className="flex justify-between"><dt className="text-gray-500">Mounting Height:</dt><dd className="font-semibold text-gray-900">{height.toFixed(1)}m <span className="text-gray-400 font-normal">(0.75m Ref Plane)</span></dd></div>
                  <div className="flex justify-between"><dt className="text-gray-500">Grid Spacing:</dt><dd className="font-semibold text-gray-900">{spacingX}m × {spacingY}m</dd></div>
                  <div className="flex justify-between"><dt className="text-gray-500">Target Lux:</dt><dd className="font-semibold text-gray-900">{targetLux} lx</dd></div>
                </dl>
              </div>
              <div>
                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 border-b border-gray-200 pb-1">Core Interior Results</h3>
                <dl className="space-y-1.5 text-sm">
                  <div className="flex justify-between"><dt className="text-gray-500">Day 1 Avg Lux:</dt><dd className="font-bold text-base" style={{color:'#15803d'}}>{Math.round(stats.interior.avg)} lx</dd></div>
                  <div className="flex justify-between"><dt className="text-gray-500">Uniformity (Min/Avg):</dt><dd className="font-bold text-base" style={{color:'#15803d'}}>{stats.interior.avg > 0 ? (stats.interior.min / stats.interior.avg).toFixed(2) : 0}</dd></div>
                  <div className="flex justify-between"><dt className="text-gray-500">Max Lux:</dt><dd className="font-bold text-base" style={{color:'#15803d'}}>{Math.round(stats.interior.max)} lx</dd></div>
                  <div className="flex justify-between"><dt className="text-gray-500">Est. Maint. Cycle:</dt><dd className="font-bold text-red-400 text-base">{yearsToFailureInterior > 0 ? `${yearsToFailureInterior.toFixed(1)} yrs` : 'Fail'}</dd></div>
                </dl>
              </div>
            </div>

            <div className="bg-gray-50 border border-gray-200 rounded-xl p-3 mt-2">
              <div className="flex items-start gap-3">
                <Info size={18} style={{color:'#15803d', flexShrink:0, marginTop:'2px'}} />
                <div>
                  <h3 className="text-xs font-semibold text-gray-700 mb-1">Why evaluate the Core Interior Area?</h3>
                  <p className="text-xs leading-relaxed" style={{fontSize:'11px'}}>
                    In a real-world layout, the lighting grid extends continuously across the ceiling. Simulating only a standalone 3×3 sample naturally creates dark "edge drop-offs" on the outer perimeter, artificially lowering average lux. By isolating the <strong>Core Interior Area</strong> (bounded by the dashed red lines), we eliminate these false edges for a highly accurate day-to-day operational representation.
                  </p>
                </div>
              </div>
            </div>

            <KpiRow title="Overall Area (Including Outer Edges)" stats={stats.overall} yearsToFailure={yearsToFailureOverall} isInterior={false} isGeneratingPDF={true} />
            <KpiRow title="Core Interior Area (Continuous Grid Simulation)" stats={stats.interior} yearsToFailure={yearsToFailureInterior} isInterior={true} isGeneratingPDF={true} />
          </div>

          <div className="html2pdf__page-break"></div>

          {/* PAGE 2 */}
          <div className="w-full mt-4">
            <div className="bg-gray-50 border border-gray-200 rounded-xl p-6 w-full h-[600px]">
              <h2 className="text-sm font-semibold text-gray-700 mb-4">Floor Layout Illumination (2D)</h2>
              <div className="w-full h-[520px] relative">
                <Heatmap height={height} spacingX={spacingX} spacingY={spacingY} fixture={fixtureDef} targetLux={targetLux} onStatsChange={setStats} />
              </div>
            </div>
          </div>

          <div className="html2pdf__page-break"></div>

          {/* PAGE 3 */}
          <div className="w-full mt-4">
            <div className="bg-gray-50 border border-gray-200 rounded-xl p-6 w-full h-[600px]">
              <h2 className="text-sm font-semibold text-gray-700 mb-4">Floor Layout Illumination (3D)</h2>
              <div className="w-full h-[520px] relative">
                <ThreeDView height={height} spacingX={spacingX} spacingY={spacingY} fixture={fixtureDef} />
              </div>
            </div>
          </div>

          <div className="html2pdf__page-break"></div>

          {/* PAGE 4 */}
          <div className="w-full space-y-6 mt-4">
            <div className="bg-gray-50 border border-gray-200 rounded-xl p-6 w-full">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-sm font-semibold text-gray-700">Lifetime Lumen Depreciation</h2>
                <div className="flex gap-4">
                  <div className="flex items-center gap-2"><div style={{width:'16px',height:'0',borderTop:'2px dashed #64748b'}}></div><span className="text-xs text-gray-500">Overall Avg</span></div>
                  <div className="flex items-center gap-2"><div style={{width:'16px',height:'4px',borderRadius:'2px',background:'#15803d'}}></div><span className="text-xs text-gray-500">Interior Avg</span></div>
                  <div className="flex items-center gap-2"><div style={{width:'12px',height:'12px',borderRadius:'50%',background:'#ef4444'}}></div><span className="text-xs text-gray-500">Target Lux</span></div>
                </div>
              </div>
              <div className="w-full bg-white rounded-lg border border-gray-200 p-4">
                <DepreciationChart stats={stats} targetLux={targetLux} fixture={fixtureDef} isGeneratingPDF={true} />
              </div>
              <p className="text-xs text-gray-400 mt-4 text-center">
                Based on empirical test data predicting {fixtureDef.desc}. Calculation uses an exponential fit decay model: α = {fixtureDef.alpha.toExponential(3)}.
              </p>
            </div>
            <div className="pt-4 border-t-2 border-gray-200 w-full">
              <h4 className="font-bold text-gray-700 mb-2">Disclaimer</h4>
              <p className="text-xs text-gray-400 text-justify leading-relaxed">
                The following values are based on precise calculations performed on calibrated lamps and luminaires, and their configurations, whereby gradual, unavoidable deviations can occur in practice. All guarantee claims are excluded for the specified data. This exclusion of liability applies irrespective of the legal grounds for both damages and consequential damages suffered by users and third parties.
              </p>
            </div>
          </div>

        </div>
      )}

    </div>
  );
}

const container = document.getElementById('root');
container.innerHTML = '';
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>
</body>
</html>
